<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00DCE5" />

  <!-- ═══ Favicon ═══ -->
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- ═══ DNS Prefetch for faster API calls ═══ -->
  <link rel="dns-prefetch" href="https://api.printdoot.com" />
  <link rel="preconnect" href="https://api.printdoot.com" crossorigin />

  <!-- ═══ SEO Meta Tags ═══ -->
  <title>PrintDoot — Premium Custom Printing & Personalized Gifts</title>
  <meta name="description"
    content="PrintDoot — India's trusted destination for premium custom printing, personalized gifts & design. T-shirts, mugs, visiting cards, photo frames & more. Order online with fast delivery across India." />
  <meta name="keywords" content="custom printing, personalized gifts, t-shirt printing, mug printing, visiting cards, photo frames, corporate gifts, PrintDoot, India" />
  <meta name="author" content="PrintDoot" />
  <link rel="canonical" href="https://printdoot.com/" />

  <!-- ═══ Open Graph (Facebook, WhatsApp, etc.) ═══ -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="PrintDoot" />
  <meta property="og:title" content="PrintDoot — Premium Custom Printing & Personalized Gifts" />
  <meta property="og:description" content="India's trusted destination for premium custom printing, personalized gifts & design. Order online with fast delivery." />
  <meta property="og:url" content="https://printdoot.com/" />
  <meta property="og:image" content="https://printdoot.com/android-chrome-512x512.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />

  <!-- ═══ Twitter Card ═══ -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="PrintDoot — Premium Custom Printing & Personalized Gifts" />
  <meta name="twitter:description" content="India's trusted destination for premium custom printing, personalized gifts & design." />
  <meta name="twitter:image" content="https://printdoot.com/android-chrome-512x512.png" />

  <!-- ═══ Fonts ═══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet" />
  </noscript>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
